<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El último cazador de reliquias</title>
    
    <!-- Google Fonts: Modern sans-serif (Inter, Montserrat) and Futuristic Tech (Space Grotesk) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Montserrat:wght@400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>
    
    <script src="src/audio.js"></script>
    <script src="src/scenes/presentation.js"></script>
    <script src="src/scenes/menu.js"></script>
    <script src="src/scenes/gameplay.js"></script>
    <script src="src/main.js"></script>
    
    <style>
        html, body {
            background-color: #08070d;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Force browser to load the webfonts immediately */
        .font-preload {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            height: 0;
            width: 0;
            overflow: hidden;
        }
        .f1 { font-family: 'Inter', sans-serif; }
        .f2 { font-family: 'Space Grotesk', sans-serif; }
        .f3 { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body>
    <!-- Hidden elements to force font loading -->
    <div class="font-preload">
        <span class="f1">.</span>
        <span class="f2">.</span>
        <span class="f3">.</span>
    </div>
    
    <!-- Explicit Game Container to allow perfect full width/height scaling -->
    <div id="game-container"></div>
</body>
</html>
